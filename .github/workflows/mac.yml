name: ci/gh-actions/mac

on:
    push:

env:
    CCACHE_SETTINGS: |
        ccache --max-size=150M
        ccache --set-config=compression=true

jobs:
    build-macos:
        runs-on: macos-latest
        env:
            CCACHE_TEMPDIR: /tmp/.ccache-temp
        steps:
            -   uses: actions/checkout@v4
                with:
                    submodules: recursive
            -   uses: actions/cache@v4
                with:
                    path: /Users/runner/Library/Caches/ccache
                    key: ccache-${{ runner.os }}-build-${{ github.sha }}
                    restore-keys: ccache-${{ runner.os }}-build-
            -   name: Install dependencies
                run: |
                    HOMEBREW_NO_AUTO_UPDATE=1 brew install boost hidapi zmq libpgm miniupnpc ldns expat libunwind-headers protobuf@21 ccache
                    brew link protobuf@21
            -   name: Build
                run: |
                    ${{env.CCACHE_SETTINGS}}
                    USE_SINGLE_DIR=1 make release-noaes -j3
            -   uses: actions/upload-artifact@v4
                with:
                    name: mac-arm64
                    path: 'build/**/**/**/bin/nerva*'
